# docker-compose.yml

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./birdle/src/backend:/app
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

  frontend:
    image: node:20
    working_dir: /frontend
    ports:
      - "5173:5173"
    volumes:
      - ./birdle:/frontend
      - /frontend/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped
